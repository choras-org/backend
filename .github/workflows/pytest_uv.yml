name: Pytest with UV

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Install system dependencies
        run: sudo apt install -y libglu1-mesa libsndfile1
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install uv and set the Python version ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the project and dependencies
        run: uv sync --all-extras --directory=simulation-backend/

      - name: Run tests
        run: uv run pytest tests
