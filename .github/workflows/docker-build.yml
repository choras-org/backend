name: Build and Push Multi-Platform Docker Image

on:
  push:
    branches: [ python311 ]

env:
  IMAGE_NAME: silvinwillemsen/choras-backend
  TAG: latest

jobs:
  # -------------------------
  # Build Linux image
  # -------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Linux image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.linux
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:linux_${{ env.TAG }}

  # -------------------------
  # Build Windows image
  # -------------------------
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Windows image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.windows
          platforms: windows/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:windows_${{ env.TAG }}

  # -------------------------
  # Merge manifest
  # -------------------------
  merge-manifest:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create $IMAGE_NAME:$TAG \
            --amend $IMAGE_NAME:linux_$TAG \
            --amend $IMAGE_NAME:windows_$TAG
          docker manifest push $IMAGE_NAME:$TAG
