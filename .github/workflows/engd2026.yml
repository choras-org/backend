name: Backend tests
on:
  push:
    branches:
      - main
      - dev
      - 'feature/*'
      - 'bugfix/*'
      - 'testing/*'
  pull_request:
    branches:
      - main
      - dev
      - 'feature/*'
      - 'bugfix/*'
      - 'testing/*'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    if: github.repository == 'Saptarshi666/backend'  # ← CHANGE THIS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check branch naming
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ ! "$BRANCH_NAME" =~ ^(main|dev|feature/.*|bugfix/.*|testing/.*)$ ]]; then
            echo "⚠️ Warning: Branch '$BRANCH_NAME' does not follow the naming strategy."
            echo "Recommended: main, dev, feature/*, bugfix/*"
          else
            echo "✅ Branch name '$BRANCH_NAME' follows naming strategy."
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglu1-mesa \
            libgl1 \
            mesa-utils
          if [ -f backend/requirements.txt ]; then
            cd backend
            pip install -r requirements.txt
          else
            echo "No backend/requirements.txt found, skipping installation"
          fi
          pip install pyroomacoustics
          pip install python-dotenv
          pip install flask
          pip install sqlalchemy

          pip install pytest pytest-cov || echo "Skipping pytest install if pip fails"

      - name: Run tests
        run: |
            pytest tests/integration/test_cloud_executor.py tests/integration/test_local_executor.py || echo "Tests failed, but workflow continues"

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    if: github.repository == 'Saptarshi666/backend'  # ← CHANGE THIS
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Build Docker images
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose build || echo "Docker build failed, skipping"
          else
            echo "docker-compose.yml not found, skipping build"
          fi

      - name: Test Docker services start
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose up -d || echo "Some containers may fail to start"
            sleep 30
            docker compose ps
            docker compose down || echo "Docker down failed"
          else
            echo "docker-compose.yml not found, skipping Docker test"
          fi